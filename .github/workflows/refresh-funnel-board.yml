name: Refresh Planner dashboard data (daily)

# Refreshes the Planner dashboard's data once a day, from all three sources:
#   Notion (practice visits) + HubSpot (deals, attribution) + Google Sheets
#   (live customers / recalls — those are kept fresh every 5 min by
#   refresh-waitlist.yml and read from the committed repo here).
#
# Chain:
#   fetch_notion_visits.py     -> notion_practice_visits.json   (Notion API; best-effort)
#   ingest_practice_visits.py  -> practice_visits.json          (normalise the sidecar)
#   pull_planner_funnel.py     -> outputs/planner_deals.json     (HubSpot deal stage timeline)
#   refresh_attribution.py     -> attribution.json               (HubSpot source/ICB/PCN/tier; best-effort)
#   build_funnel_board.py      -> funnel_board.json              (joins all of the above + recalls.json
#                                                                 + live deal->company->ODS + future meetings)
#
# Daily (not 5-min): deal stages move a few times a week and visits are logged
# manually — no need to hammer the APIs. recalls.json is already 5-min-fresh.
#
# Required secrets:
#   HUBSPOT_API_TOKEN — EU1 Private App token (crm.objects.deals.read; meetings/
#                       associations best-effort, degrade gracefully if missing).
#   NOTION_API_TOKEN  — internal integration shared with the "Practice Visits" DB.
#                       If unset/failing, the Notion step is skipped and the last
#                       committed sidecar is reused (so the board still rebuilds).

on:
  schedule:
    - cron: '30 6 * * *'      # 06:30 UTC daily (before the 07:00 sheet push)
  workflow_dispatch: {}

concurrency:
  group: refresh-funnel-board
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh Notion practice visits (best-effort)
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        continue-on-error: true
        run: python3 pipeline/fetch_notion_visits.py

      - name: Normalise practice visits
        run: python3 pipeline/ingest_practice_visits.py

      - name: Pull Planner deals + stage timeline
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        run: python3 pipeline/pull_planner_funnel.py

      - name: Refresh attribution (HubSpot source/ICB/tier; best-effort)
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        continue-on-error: true
        run: python3 pipeline/refresh_attribution.py

      - name: Build funnel board
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        run: python3 pipeline/build_funnel_board.py

      - name: Commit, push, and trigger Netlify deploy
        env:
          # Optional: Netlify "Build hook" URL. Needed because the data commit below
          # carries [skip ci], which Netlify treats as "skip build" — so we trigger
          # the redeploy explicitly. Create it in Netlify (Site config -> Build &
          # deploy -> Build hooks) and add it as a repo secret NETLIFY_BUILD_HOOK.
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          git config user.name  "suvera-refresh-bot"
          git config user.email "noreply@suvera.co.uk"
          git add -f \
            apps/primary-care-tech-overview/public/data/funnel_board.json \
            apps/primary-care-tech-overview/public/data/practice_visits.json \
            apps/primary-care-tech-overview/public/data/attribution.json \
            notion_practice_visits.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "auto: refresh dashboard data $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          # Retry-on-conflict: another scheduled run may have pushed first.
          pushed=0
          for i in 1 2 3; do
            if git push; then pushed=1; break; fi
            echo "Push failed, rebasing on latest origin/main and retrying ($i/3)"
            git pull --rebase origin main
          done
          [ "$pushed" = 1 ] || { echo "Push failed after 3 attempts"; exit 1; }
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            echo "Triggering Netlify redeploy via build hook"
            curl -fsS -X POST -d '{}' "$NETLIFY_BUILD_HOOK" >/dev/null && echo "Netlify hook OK" || echo "Netlify hook failed (non-fatal)"
          else
            echo "NETLIFY_BUILD_HOOK not set — skipping explicit Netlify trigger."
          fi
