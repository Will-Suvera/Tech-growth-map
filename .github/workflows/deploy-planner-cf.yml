name: Deploy Planner (Cloudflare Pages)

# Builds the Planner dashboard and deploys it to Cloudflare Pages — replacing the
# Netlify hosting. The dashboard's data (funnel_board.json / practice_visits.json /
# attribution.json) is GENERATED FRESH HERE from the source APIs and built straight
# into the deploy artifact. It is NOT committed to the (public) repo, so the
# internal CS/sales data never lands in public git history. Cloudflare Access gates
# the deployed site to @suvera.co.uk, so the data is private at the edge too.
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN   — token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#   HUBSPOT_API_TOKEN      — EU1 Private App token (already used by the refresh workflow)
#   NOTION_API_TOKEN       — Notion integration shared with the Practice Visits DB (best-effort)
#   VITE_GOOGLE_CLIENT_ID  — the OAuth client id baked into the build for sign-in
#
# Cloudflare Pages project env vars (set in the dashboard, NOT here):
#   NEON_DATABASE_URL (required), and optionally HUBSPOT_API_TOKEN +
#   HUBSPOT_NOTES_SYNC / HUBSPOT_DEAL_WRITE (see functions/api/[[path]].js).
#   GOOGLE_CLIENT_ID is NO LONGER required here: the token check's client id is
#   baked from VITE_GOOGLE_CLIENT_ID at build (server-data/auth-config.json), so it
#   can't drift from the SPA. A GOOGLE_CLIENT_ID env var, if set, is accepted as an
#   ADDITIONAL trusted client.

on:
  push:
    # feat/dashboard-aurora-redesign is TEMPORARY — to ship the first deploy
    # before the main merge. Remove it from this list once merged to main.
    branches: [main, feat/dashboard-aurora-redesign]
    paths:
      - 'apps/primary-care-tech-overview/**'
      - 'pipeline/**'
      - '.github/workflows/deploy-planner-cf.yml'
  schedule:
    - cron: '30 6 * * *'   # daily: regenerate data + redeploy (deal stages move a few times a week)
  workflow_dispatch: {}

concurrency:
  group: deploy-planner-cf
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Persist the previous funnel_board.json across runs so build_funnel_board.py
      # can read it for week-over-week kpi_history (it used to rely on the committed
      # file; now that the data isn't committed, the cache carries it forward).
      - name: Restore previous funnel board (WoW history)
        uses: actions/cache/restore@v4
        with:
          path: apps/primary-care-tech-overview/public/data/funnel_board.json
          key: funnel-board-${{ github.run_id }}
          restore-keys: |
            funnel-board-

      # ---------- generate the dashboard data (NOT committed) ----------
      - name: Refresh Notion practice visits (best-effort)
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        continue-on-error: true
        run: python3 pipeline/fetch_notion_visits.py

      - name: Normalise practice visits
        run: python3 pipeline/ingest_practice_visits.py

      - name: Pull Planner deals + stage timeline
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        run: python3 pipeline/pull_planner_funnel.py

      - name: Refresh attribution (best-effort)
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        continue-on-error: true
        run: python3 pipeline/refresh_attribution.py

      - name: Build funnel board
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        run: python3 pipeline/build_funnel_board.py

      # Push HubSpot/recall facts into the Commercial ▸ Recall Priority List Notion
      # DB, so a deal renamed "PAID - ..." shows up there as a paying row within a
      # day. Best-effort: the integration needs to be shared with that database and
      # with Planner Practices, and a Notion outage must not block the deploy.
      - name: Sync Notion recall priority list (best-effort)
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        continue-on-error: true
        run: python3 pipeline/sync_recall_priority_notion.py

      - name: Cache funnel board for next run's WoW history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: apps/primary-care-tech-overview/public/data/funnel_board.json
          key: funnel-board-${{ github.run_id }}

      # Stage the generated data where the Pages Function bundles it from (private,
      # served only to signed-in users) — it must NOT ship as a public static asset.
      - name: Stage private data for the API
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          mkdir -p apps/primary-care-tech-overview/server-data
          cp apps/primary-care-tech-overview/public/data/funnel_board.json \
             apps/primary-care-tech-overview/public/data/practice_visits.json \
             apps/primary-care-tech-overview/server-data/
          # Bake the SAME OAuth client id the SPA is built with into the API's
          # token check, so server and frontend can never drift (the 401 outage).
          printf '{"google_client_id":"%s"}' "$VITE_GOOGLE_CLIENT_ID" \
             > apps/primary-care-tech-overview/server-data/auth-config.json

      # ---------- build the SPA (vite copies public/ into dist/) ----------
      - name: Build app
        working-directory: apps/primary-care-tech-overview
        env:
          VITE_ONB_API: /api/onboarding
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build

      # The dashboard data must never be a public static file — strip it from the
      # build output. The app loads it from the authenticated API instead.
      - name: Strip private data from the public bundle
        run: rm -rf apps/primary-care-tech-overview/dist/data

      # Ensure the Pages Function has the HubSpot credentials. Without them the
      # note-push and the mark-live / dropped-out deal-stage writes are silently
      # disabled (hs_synced=false) — the Function reads these from context.env.
      # Idempotent: re-putting the same secret is a no-op overwrite.
      - name: Sync HubSpot secrets to the Pages project
        working-directory: apps/primary-care-tech-overview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        run: |
          printf '%s' "$HUBSPOT_API_TOKEN" | npx wrangler@4 pages secret put HUBSPOT_API_TOKEN --project-name=planner-onboarding
          printf '1' | npx wrangler@4 pages secret put HUBSPOT_NOTES_SYNC --project-name=planner-onboarding
          printf '1' | npx wrangler@4 pages secret put HUBSPOT_DEAL_WRITE --project-name=planner-onboarding

      # ---------- deploy dist/ (static + the Pages Function) to Cloudflare ----------
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/primary-care-tech-overview
          command: pages deploy dist --project-name=planner-onboarding --branch=main
