name: Deploy Planner (Cloudflare Pages)

# Builds the Planner dashboard and deploys it to Cloudflare Pages — replacing the
# Netlify hosting. The dashboard's data (funnel_board.json / practice_visits.json /
# attribution.json) is GENERATED FRESH HERE from the source APIs and built straight
# into the deploy artifact. It is NOT committed to the (public) repo, so the
# internal CS/sales data never lands in public git history. Cloudflare Access gates
# the deployed site to @suvera.co.uk, so the data is private at the edge too.
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN   — token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#   HUBSPOT_API_TOKEN      — EU1 Private App token (already used by the refresh workflow)
#   NOTION_API_TOKEN       — Notion integration shared with the Practice Visits DB (best-effort)
#   VITE_GOOGLE_CLIENT_ID  — the OAuth client id baked into the build for sign-in
#
# Cloudflare Pages project env vars (set in the dashboard, NOT here):
#   NEON_DATABASE_URL, GOOGLE_CLIENT_ID, and optionally HUBSPOT_API_TOKEN +
#   HUBSPOT_NOTES_SYNC / HUBSPOT_DEAL_WRITE (see functions/api/[[path]].js).

on:
  push:
    # feat/dashboard-aurora-redesign is TEMPORARY — to ship the first deploy
    # before the main merge. Remove it from this list once merged to main.
    branches: [main, feat/dashboard-aurora-redesign]
    paths:
      - 'apps/primary-care-tech-overview/**'
      - 'pipeline/**'
      - '.github/workflows/deploy-planner-cf.yml'
  schedule:
    - cron: '30 6 * * *'   # daily: regenerate data + redeploy (deal stages move a few times a week)
  workflow_dispatch: {}

concurrency:
  group: deploy-planner-cf
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Persist the previous funnel_board.json across runs so build_funnel_board.py
      # can read it for week-over-week kpi_history (it used to rely on the committed
      # file; now that the data isn't committed, the cache carries it forward).
      - name: Restore previous funnel board (WoW history)
        uses: actions/cache/restore@v4
        with:
          path: apps/primary-care-tech-overview/public/data/funnel_board.json
          key: funnel-board-${{ github.run_id }}
          restore-keys: |
            funnel-board-

      # ---------- generate the dashboard data (NOT committed) ----------
      - name: Refresh Notion practice visits (best-effort)
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        continue-on-error: true
        run: python3 pipeline/fetch_notion_visits.py

      - name: Normalise practice visits
        run: python3 pipeline/ingest_practice_visits.py

      - name: Pull Planner deals + stage timeline
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        run: python3 pipeline/pull_planner_funnel.py

      - name: Refresh attribution (best-effort)
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        continue-on-error: true
        run: python3 pipeline/refresh_attribution.py

      - name: Build funnel board
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        run: python3 pipeline/build_funnel_board.py

      - name: Cache funnel board for next run's WoW history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: apps/primary-care-tech-overview/public/data/funnel_board.json
          key: funnel-board-${{ github.run_id }}

      # ---------- build the SPA (vite copies public/, incl. the generated data, into dist/) ----------
      - name: Build app
        working-directory: apps/primary-care-tech-overview
        env:
          VITE_ONB_API: /api/onboarding
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build

      # ---------- deploy dist/ (static + the Pages Function) to Cloudflare ----------
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/primary-care-tech-overview
          command: pages deploy dist --project-name=planner-onboarding --branch=main
