name: Tests

# Runs the unittest suite on every push and PR.
# Needs openpyxl for icb_mapper (reads the NHS ICB merger xlsx).
# Google Sheets deps are mocked in tests, so google-auth/googleapiclient
# are NOT required here.

on:
  push:
    branches: [main]
    paths-ignore:
      # Don't re-run tests on the bot's data refresh commits.
      - 'public/data/waitlist_ods.json'
      - 'public/snapshots/**'
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python3 -m pip install --upgrade pip openpyxl google-api-python-client

      - name: Run unittest suite
        run: python3 -m unittest discover -s tests -v
